<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combined Grid and Flexbox Layout</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
  }
  .page-container {
    display: grid;
    grid-template-areas: 
      "header header"
      "sidebar content"
      "footer footer";
    grid-template-columns: 1fr 3fr; /* Sidebar : Content ratio */
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }
  header {
    grid-area: header;
    background: #333;
    color: #fff;
    padding: 1rem;
    text-align: center;
  }
  .sidebar {
    grid-area: sidebar;
    background: #f4f4f4;
    padding: 20px;
  }
  .content {
    grid-area: content;
    padding: 20px;
    display: flex;
    flex-direction: column; /* Stack content vertically */
    gap: 20px; /* Space between flex items */
  }
  .article {
    background: #e8e8e8;
    padding: 15px;
    border-radius: 8px;
  }
  footer {
    grid-area: footer;
    background: #333;
    color: #fff;
    padding: 1rem;
    text-align: center;
  }
</style>
</head>
<body>

<div class="page-container">
  <header>Header</header>
  <div class="sidebar">Sidebar content</div>
  <div class="content">
    <div class="article">Article 1</div>
    <div class="article">Article 2</div>
    <div class="article">Article 3</div>
  </div>
  <footer>Footer</footer>
</div>

</body>
</html>
